services:
    node1:
        image: ubuntu:22.04
        container_name: ansible-node1
        command: bash -c "apt-get update -qq && apt-get install -y python3 -qq && sleep infinity"
        networks:
            - ansible-net

    node2:
        image: ubuntu:22.04
        container_name: ansible-node2
        command: bash -c "apt-get update -qq && apt-get install -y python3 -qq && sleep infinity"
        networks:
            - ansible-net

networks:
    ansible-net:
        name: ansible-net
